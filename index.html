<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye İller Rehberi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --card: #1a2032;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #9ba3b8;
    --text3: #6b7390;
    --accent: #e8512a;
    --accent2: #ff7043;
    --gold: #f0a500;
    --teal: #26c6a8;
    --blue: #4a90d9;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== MAP VIEW ===== */
  #map-view {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .hero {
    background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 50%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 200px;
    background: radial-gradient(ellipse, rgba(232,81,42,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.4rem;
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    color: var(--text2);
    font-size: 0.95rem;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.2rem;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Search */
  .search-wrap {
    padding: 1.2rem 1.5rem 0;
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 50px;
    padding: 0.7rem 1.2rem 0.7rem 3rem;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 1rem;
  }

  /* Region filter */
  .region-wrap {
    padding: 1rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto;
  }

  .region-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.35rem 0.9rem;
    font-size: 0.78rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .region-btn:hover { border-color: var(--border2); color: var(--text); }
  .region-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* Grid */
  .provinces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.75rem;
    padding: 0.5rem 1.5rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .province-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  .province-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .province-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    background: var(--bg3);
  }

  .province-card:hover::before { transform: scaleX(1); }

  .province-plate {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    letter-spacing: 0.5px;
  }

  .province-name {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: var(--text);
  }

  .province-region {
    font-size: 0.7rem;
    color: var(--text3);
  }

  .province-count {
    margin-top: 0.5rem;
    font-size: 0.7rem;
    color: var(--teal);
  }

  /* ===== DETAIL VIEW ===== */
  #detail-view {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }

  .detail-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 50px;
    padding: 0.4rem 1rem 0.4rem 0.7rem;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .back-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .back-btn svg { width: 16px; height: 16px; }

  .detail-header-info { flex: 1; }

  .detail-header-info h2 {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .detail-header-info span {
    font-size: 0.78rem;
    color: var(--text3);
  }

  .plate-badge {
    background: var(--accent);
    color: #fff;
    font-size: 1.1rem;
    font-weight: 800;
    padding: 0.4rem 0.8rem;
    border-radius: var(--radius-sm);
    letter-spacing: 1px;
    min-width: 52px;
    text-align: center;
  }

  /* Detail body */
  .detail-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
    width: 100%;
  }

  /* Meta cards */
  .meta-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .meta-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
  }

  .meta-card .label {
    font-size: 0.68rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.3rem;
  }

  .meta-card .value {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .meta-card .value.accent { color: var(--gold); }

  /* Slogan */
  .slogan-box {
    background: linear-gradient(135deg, rgba(232,81,42,0.12), rgba(232,81,42,0.05));
    border: 1px solid rgba(232,81,42,0.3);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    font-style: italic;
    color: var(--accent2);
    font-size: 1rem;
  }

  /* Facts */
  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .facts-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .fact-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--teal);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text);
    transition: border-left-color 0.15s;
  }

  .fact-item:hover { border-left-color: var(--accent); }

  /* Districts */
  .districts-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 2rem;
  }

  .district-tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.3rem 0.75rem;
    font-size: 0.78rem;
    color: var(--text2);
    transition: all 0.15s;
  }

  .district-tag:hover {
    border-color: var(--border2);
    color: var(--text);
    background: var(--card);
  }

  /* Counter badge */
  .count-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    color: var(--text2);
    margin-bottom: 1rem;
  }

  .count-badge strong { color: var(--gold); }

  /* No results */
  .no-results {
    text-align: center;
    color: var(--text3);
    padding: 3rem 1rem;
    grid-column: 1 / -1;
  }

  .no-results .emoji { font-size: 2rem; margin-bottom: 0.5rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- MAP VIEW (province list) -->
<div id="map-view">
  <div class="hero">
    <h1>Türkiye <span>İller</span> Rehberi</h1>
    <p>81 il · plaka kodları · ilçeler · ünlü özellikler</p>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num" id="total-il">81</div>
        <div class="stat-label">İl</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="total-bilgi">–</div>
        <div class="stat-label">Bilgi</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="total-ilce">–</div>
        <div class="stat-label">İlçe</div>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="İl ara... (örn: Ankara, Antalya)" autocomplete="off">
    </div>
  </div>

  <div class="region-wrap" id="region-filters"></div>

  <div class="provinces-grid" id="provinces-grid"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div class="detail-header">
    <button class="back-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      Haritaya dön
    </button>
    <div class="detail-header-info">
      <h2 id="detail-name">–</h2>
      <span id="detail-region">–</span>
    </div>
    <div class="plate-badge" id="detail-plate">00</div>
  </div>

  <div class="detail-body">
    <div class="meta-row" id="detail-meta"></div>
    <div class="slogan-box" id="detail-slogan"></div>

    <div class="section-title">Öne Çıkan Bilgiler</div>
    <div class="facts-list" id="detail-facts"></div>

    <div class="section-title">İlçeler</div>
    <div class="districts-wrap" id="detail-districts"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
  const mapView = document.getElementById('map-view');
  const detailView = document.getElementById('detail-view');
  const grid = document.getElementById('provinces-grid');
  const searchInput = document.getElementById('search-input');
  const regionFiltersEl = document.getElementById('region-filters');
  let activeRegion = 'Tümü';

  // Compute totals
  const totalBilgi = ILLER.reduce((s, il) => s + il.bilgiler.length, 0);
  const totalIlce = ILLER.reduce((s, il) => s + il.ilceler.length, 0);
  document.getElementById('total-bilgi').textContent = totalBilgi;
  document.getElementById('total-ilce').textContent = totalIlce;

  // Regions
  const regions = ['Tümü', ...new Set(ILLER.map(i => i.bolge))];
  regions.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'region-btn' + (r === 'Tümü' ? ' active' : '');
    btn.textContent = r;
    btn.onclick = () => {
      activeRegion = r;
      document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    regionFiltersEl.appendChild(btn);
  });

  // Render grid
  function renderGrid() {
    const q = searchInput.value.trim().toLowerCase();
    const filtered = ILLER.filter(il => {
      const matchRegion = activeRegion === 'Tümü' || il.bolge === activeRegion;
      const matchSearch = !q || il.ad.toLowerCase().includes(q) || il.plaka.includes(q);
      return matchRegion && matchSearch;
    });

    grid.innerHTML = '';

    if (!filtered.length) {
      grid.innerHTML = '<div class="no-results"><div class="emoji">🔍</div><div>Sonuç bulunamadı.</div></div>';
      return;
    }

    filtered.forEach(il => {
      const card = document.createElement('div');
      card.className = 'province-card';
      card.innerHTML = `
        <div class="province-plate">${il.plaka}</div>
        <div class="province-name">${il.ad}</div>
        <div class="province-region">${il.bolge}</div>
        <div class="province-count">● ${il.bilgiler.length} bilgi · ${il.ilceler.length} ilçe</div>
      `;
      card.onclick = () => showDetail(il);
      grid.appendChild(card);
    });
  }

  searchInput.addEventListener('input', renderGrid);

  // Show detail
  function showDetail(il) {
    document.getElementById('detail-name').textContent = il.ad;
    document.getElementById('detail-region').textContent = il.bolge + ' Bölgesi';
    document.getElementById('detail-plate').textContent = il.plaka;
    document.getElementById('detail-slogan').textContent = '« ' + il.slogan + ' »';

    // Meta
    const meta = document.getElementById('detail-meta');
    meta.innerHTML = `
      <div class="meta-card">
        <div class="label">Plaka Kodu</div>
        <div class="value accent">${il.plaka}</div>
      </div>
      <div class="meta-card">
        <div class="label">Bölge</div>
        <div class="value">${il.bolge}</div>
      </div>
      <div class="meta-card">
        <div class="label">Nüfus</div>
        <div class="value">${il.nufus}</div>
      </div>
      <div class="meta-card">
        <div class="label">Yüzölçümü</div>
        <div class="value">${il.yuzolcum}</div>
      </div>
      <div class="meta-card">
        <div class="label">İlçe Sayısı</div>
        <div class="value accent">${il.ilceler.length}</div>
      </div>
      <div class="meta-card">
        <div class="label">Bilgi Sayısı</div>
        <div class="value accent">${il.bilgiler.length}</div>
      </div>
    `;

    // Facts
    const facts = document.getElementById('detail-facts');
    facts.innerHTML = il.bilgiler.map(b => `<div class="fact-item">${b}</div>`).join('');

    // Districts
    const dist = document.getElementById('detail-districts');
    dist.innerHTML = il.ilceler.map(d => `<div class="district-tag">${d}</div>`).join('');

    // Switch view
    mapView.style.display = 'none';
    detailView.style.display = 'flex';
    detailView.style.flexDirection = 'column';
    window.scrollTo(0, 0);
  }

  // Back button
  document.getElementById('back-btn').onclick = () => {
    detailView.style.display = 'none';
    mapView.style.display = 'flex';
    mapView.style.flexDirection = 'column';
    window.scrollTo(0, 0);
  };

  // Initial render
  renderGrid();
</script>
</body>
</html>
