const SVG_W = 1000, SVG_H = 480;
const LAT_MAX = 42.3, LAT_MIN = 36.0, LON_MIN = 25.7, LON_MAX = 44.8;
function toXY(lat, lon) {
  const x = ((lon - LON_MIN) / (LON_MAX - LON_MIN)) * (SVG_W - 60) + 30;
  const y = ((LAT_MAX - lat) / (LAT_MAX - LAT_MIN)) * (SVG_H - 60) + 30;
  return [x, y];
}

const svg = document.getElementById('map-svg');
const circles = {};
let selectedId = null;
let activeRegion = 'Tümü';

ILLER_DATA.forEach(il => {
  const coords = IL_COORDS[il.ad];
  if (!coords) return;
  const [x, y] = toXY(coords[0], coords[1]);
  const color = BOLGE_COLORS[il.bolge] || '#888780';
  const r = Math.max(6, Math.min(14, 6 + il.bilgiler.length * 0.8));

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor = 'pointer';

  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', x);
  circle.setAttribute('cy', y);
  circle.setAttribute('r', r);
  circle.setAttribute('fill', color);
  circle.setAttribute('opacity', '0.85');
  circle.setAttribute('stroke', '#fff');
  circle.setAttribute('stroke-width', '0.8');

  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', x);
  txt.setAttribute('y', y - r - 2);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('font-size','8');
  txt.setAttribute('fill','var(--color-text-secondary)');
  txt.textContent = il.plaka;

  g.appendChild(circle);
  g.appendChild(txt);
  g.onclick = () => showDetail(il);
  g.onmouseenter = () => { if (selectedId !== il.id) { circle.setAttribute('r', r + 3); circle.setAttribute('opacity','1'); } };
  g.onmouseleave = () => { if (selectedId !== il.id) { circle.setAttribute('r', r); circle.setAttribute('opacity','0.85'); } };
  svg.appendChild(g);
  circles[il.id] = { g, circle, r, color };
});

function showDetail(il) {
  if (selectedId !== null && circles[selectedId]) {
    const prev = circles[selectedId];
    prev.circle.setAttribute('r', prev.r);
    prev.circle.setAttribute('stroke','#fff');
    prev.circle.setAttribute('stroke-width','0.8');
  }
  selectedId = il.id;
  const c = circles[il.id];
  c.circle.setAttribute('r', c.r + 4);
  c.circle.setAttribute('stroke','#0C447C');
  c.circle.setAttribute('stroke-width','2');

  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('dp').innerHTML = `
    <div class="dp-header">
      <div class="dp-plate">${il.plaka}</div>
      <div><div class="dp-title">${il.ad}</div><div class="dp-sub">${il.bolge} Bölgesi</div></div>
    </div>
    <div class="dp-slogan">« ${il.slogan} »</div>
    <div class="meta-grid">
      <div class="meta-item"><div class="ml">Nüfus</div><div class="mv">${il.nufus}</div></div>
      <div class="meta-item"><div class="ml">Yüzölçümü</div><div class="mv">${il.yuzolcum}</div></div>
      <div class="meta-item"><div class="ml">İlçe sayısı</div><div class="mv">${il.ilceler.length}</div></div>
      <div class="meta-item"><div class="ml">Bilgi sayısı</div><div class="mv">${il.bilgiler.length}</div></div>
    </div>
    <div class="sec-label">Öne çıkan bilgiler</div>
    <div class="facts-list">${il.bilgiler.map(b=>`<div class="fact">${b}</div>`).join('')}</div>
    <div class="sec-label" style="margin-top:12px">İlçeler</div>
    <div class="tags">${il.ilceler.map(d=>`<span class="tag">${d}</span>`).join('')}</div>
  `;
}

function clearSel() {
  if (selectedId !== null && circles[selectedId]) {
    const prev = circles[selectedId];
    prev.circle.setAttribute('r', prev.r);
    prev.circle.setAttribute('stroke','#fff');
    prev.circle.setAttribute('stroke-width','0.8');
  }
  selectedId = null;
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('dp').innerHTML = '<div class="no-sel">Haritadan bir il seçin veya arama yapın</div>';
}

const regions = ['Tümü',...new Set(ILLER_DATA.map(i=>i.bolge))];
const rfilter = document.getElementById('rfilter');
regions.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'rbtn' + (r==='Tümü'?' active':'');
  btn.textContent = r;
  btn.style.fontSize = '11px';
  if (BOLGE_COLORS[r]) {
    btn.dataset.color = BOLGE_COLORS[r];
  }
  btn.onclick = () => {
    activeRegion = r;
    document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterMap();
  };
  rfilter.appendChild(btn);
});

function filterMap() {
  const q = document.getElementById('srch').value.trim().toLowerCase();
  ILLER_DATA.forEach(il => {
    const c = circles[il.id];
    if (!c) return;
    const matchR = activeRegion==='Tümü' || il.bolge===activeRegion;
    const matchQ = !q || il.ad.toLowerCase().includes(q) || il.plaka.includes(q);
    c.g.style.display = (matchR && matchQ) ? '' : 'none';
  });
}

document.getElementById('srch').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (q.length >= 2) {
    const found = ILLER_DATA.find(il => il.ad.toLowerCase().startsWith(q));
    if (found) showDetail(found);
  }
  filterMap();
});
